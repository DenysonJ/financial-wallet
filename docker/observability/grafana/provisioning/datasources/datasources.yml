# Grafana datasources provisioning.
# On boot, Grafana reads this file and creates 3 datasources (Loki, Tempo,
# Prometheus) with cross-correlation wired: clicking a trace_id in a log
# opens the waterfall in Tempo (split view), and each span has a
# "Related logs" button that jumps to Loki filtered by trace_id.

apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      # Derived Fields: when a log line contains "trace_id":"...", Grafana
      # renders the value as a clickable link that opens the matching trace
      # in the Tempo datasource (split pane).
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'
      # ECS-style logs keep the message in a top-level field; Explore uses
      # this as the main line.
      maxLines: 1000

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      # From a span → open logs for the same trace_id in Loki.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        tags:
          - key: service.name
            value: service_name
        filterByTraceID: true
        customQuery: true
        query: '{service_name="$${__span.tags["service.name"]}"} |= "$${__trace.traceId}"'
      # Service map uses Prometheus (Tempo's metrics_generator writes there).
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      # Exemplars — click a data point in a metric chart, jump to the matching trace.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
