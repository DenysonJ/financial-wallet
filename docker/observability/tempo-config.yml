# Tempo single-binary config for local development.
# Receives OTLP from the OTel Collector, stores traces on filesystem,
# and exports span metrics/service graphs to Prometheus via remote_write.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

# OTLP receiver. Internal-only — the host-side OTLP port belongs to the
# OTel Collector. The collector forwards traces here via `tempo:4317`.
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h  # 7d of traces

# Generate RED metrics (rate/errors/duration) + service graphs from traces.
# Prometheus scrapes these via remote_write below.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    service_graphs:
      dimensions: []
    span_metrics:
      dimensions: []

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Apply metrics_generator + service_graphs to every tenant.
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
