# Observability stack for local development.
# Pattern: Grafana LGTM(P) — Loki + Grafana + Tempo + Mimir-swap-Prometheus.
# OTel Collector is the sole ingress for the Go app (OTLP gRPC :4317).
#
# Requer: make docker-up (cria a rede financial-wallet-network)
# Uso:    docker compose -f docker/observability/docker-compose.yml up -d

name: financial-wallet

services:
  # ============================================
  # LOKI — logs
  # ============================================
  loki:
    image: grafana/loki:3.2.0
    container_name: financial-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - financial-wallet-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # TEMPO — traces
  # ============================================
  tempo:
    image: grafana/tempo:2.6.0
    container_name: financial-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    user: "0"  # needs write access to /var/tempo
    volumes:
      - ./tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"  # query API / UI proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - financial-wallet-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # PROMETHEUS — métricas + remote_write do Tempo
  # ============================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: financial-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - financial-wallet-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  # ============================================
  # GRAFANA — UI única (Loki + Tempo + Prometheus)
  # ============================================
  grafana:
    image: grafana/grafana:11.3.0
    container_name: financial-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor,metricsSummary
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - financial-wallet-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # OPENTELEMETRY COLLECTOR — único ingress OTLP do app
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: financial-otel-collector
    command: ["--config=/etc/otel-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-config.yml:ro
    ports:
      - "4317:4317"  # OTLP gRPC (app → collector)
      - "4318:4318"  # OTLP HTTP
      - "8888:8888"  # collector internal metrics
      - "8889:8889"  # Prometheus exporter (scraped by Prometheus)
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - financial-wallet-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  financial-wallet-network:
    external: true
