# Loki single-binary config for local development.
# Filesystem backend (not for prod). 7-day retention.
# OTLP ingestion is enabled by default in Loki 3.x on /otlp/v1/logs.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Keep indexed labels small; everything else stays as structured metadata.
  max_label_name_length: 1024
  max_label_value_length: 4096
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h  # 7d — adjust for more history
  # Loki 3.2+ auto-promotes standard OTel resource attributes (service.name,
  # service.namespace, deployment.environment) to indexed labels using the
  # default otlp_config. No explicit config needed.

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
