# OpenTelemetry Collector configuration.
# Receives OTLP from the Go app (traces + metrics + logs) and fans out:
#   traces   → Tempo     (OTLP gRPC)
#   logs     → Loki      (OTLP HTTP /otlp/v1/logs)
#   metrics  → Prometheus (scraped from this collector's :8889 exporter)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: environment
        value: development
        action: insert
      - key: deployment.environment
        value: development
        action: insert

exporters:
  # Traces → Tempo (OTLP gRPC inside the docker network).
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Logs → Loki via native OTLP ingestion (Loki 3.x exposes /otlp/v1/logs).
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

  # Metrics → exposed on :8889 and scraped by Prometheus.
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: financial_service

  # Debug/local troubleshooting — sampled output to the collector stdout.
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/loki, debug]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
