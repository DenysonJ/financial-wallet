# golangci-lint configuration
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  tests: true
  modules-download-mode: readonly

output:
  sort-results: true
  sort-order:
    - severity

linters:
  default: none
  enable:
    # Default linters
    - errcheck # Checks for unchecked errors
    - govet # Reports suspicious constructs
    - ineffassign # Detects unused variable assignments
    - staticcheck # Static analysis
    - unused # Checks for unused constants, variables, functions and types

    # Security
    - gosec # Security problems

    # Bugs
    - bodyclose # Checks HTTP response body is closed
    - durationcheck # Checks for two durations multiplied together
    - copyloopvar # Replaces deprecated exportloopref (Go 1.22+)
    - nilerr # Finds code returning nil error
    - sqlclosecheck # Checks that sql.Rows and sql.Stmt are closed

    # Style & Best Practices
    - gocritic # Highly extensible linter
    - misspell # Finds commonly misspelled English words
    - unconvert # Unnecessary type conversions
    - unparam # Unused function parameters
    - prealloc # Finds slice declarations that could be preallocated

    # Error handling
    - errorlint # Finds issues with error wrapping

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # Too strict for most cases

    gosec:
      excludes:
        - G104 # Unhandled errors (errcheck handles this)
      config:
        global:
          audit: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - whyNoLint
        - hugeParam # Can be too strict

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    misspell:
      locale: US

  exclusions:
    rules:
      # Exclude test files from some linters
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic

      # Exclude main.go from wrapcheck
      - path: cmd/api/main\.go
        linters:
          - wrapcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

formatters:
  enable:
    - gofmt
    - goimports
